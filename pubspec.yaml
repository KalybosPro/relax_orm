name: relax_orm
description: "A local-first ORM for Flutter with offline support, real-time streams, automatic sync, and encryption."
version: 0.1.0
homepage: https://github.com/KalybosPro/relax_orm
repository: https://github.com/KalybosPro/relax_orm
issue_tracker: https://github.com/KalybosPro/relax_orm/issues
license: MIT

topics:
  - orm
  - database
  - offline-first
  - sync
  - sqlite

platforms:
  android:
  ios:
  linux:
  macos:
  windows:

environment:
  sdk: ">=3.11.0 <4.0.0"
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  drift: ^2.32.1
  drift_flutter: ^0.3.0
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.0
  relax_orm_generator: ^0.1.0

# Enable SQLite3MultipleCiphers for database encryption.
hooks:
  user_defines:
    sqlite3:
      source: sqlite3mc
